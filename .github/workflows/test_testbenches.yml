name: TestAllTB

on:
  push:
    branches: 
      - master
      - dev/**
      - fea/**
    paths:
      - 'hw/**'
      - 'scripts/**'
      - '.github/workflows/**'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  test:
    runs-on: vivado

    steps:
      - uses: actions/checkout@v4

      - name: Build project
        run: ./scripts/create_all_vivado_projects.sh

      - name: Test all testbenches
        run: vivado -mode batch -source "./scripts/test_all_hw_tb.tcl"
