name: TestAllTB

on:
  push:
    branches: 
      - master
      - dev/**
      - fea/**
      - ArtyZ7/master
      - ArtyZ7/dev/**
      - ArtyZ7/fea/**
    paths:
      - 'hw/**'
      - 'scripts/**'
      - '.github/workflows/**'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  test:
    runs-on: vivado

    steps:
      - uses: actions/checkout@v6

      - name: Build project
        run: ./scripts/create_all_vivado_projects.sh

      - name: Test all testbenches
        run: vivado -mode batch -source "./scripts/test_all_hw_tb.tcl"
